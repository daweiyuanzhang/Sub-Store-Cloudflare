name: Monitor Upstream Releases

on:
  schedule:
    # SGT 07:28 / 17:16 daily (UTC 23:28 / 09:16).
    - cron: '28 23 * * *'
    - cron: '16 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: monitor-upstream-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUBSTORE_REPO: sub-store-org/Sub-Store
  FRONTEND_REPO: sub-store-org/Sub-Store-Front-End

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          check-latest: true

      - name: Check upstream releases from the last week
        id: check
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SUBSTORE_REPO: ${{ env.SUBSTORE_REPO }}
          FRONTEND_REPO: ${{ env.FRONTEND_REPO }}
        run: node scripts/sync-upstream-versions.js

      - name: Commit upstream version markers
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json wrangler.jsonc .upstream/backend-version .upstream/frontend-version .upstream/cloudflare-version .upstream/metadata.json
          git commit -m "chore(upstream): sync Sub-Store updates"
          git push

      - name: Summary
        run: |
          echo "## Upstream monitor" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Value | Changed | Recent releases |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---:|---:|---:|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Sub-Store Cloudflare | \`${{ steps.check.outputs.cloudflare_version }}\` | \`${{ steps.check.outputs.cloudflare_version_changed }}\` | - |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Backend | \`${{ steps.check.outputs.backend_version }}\` | \`${{ steps.check.outputs.backend_changed }}\` | \`${{ steps.check.outputs.backend_recent_count }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Frontend | \`${{ steps.check.outputs.frontend_version }}\` | \`${{ steps.check.outputs.frontend_changed }}\` | \`${{ steps.check.outputs.frontend_recent_count }}\` |" >> "$GITHUB_STEP_SUMMARY"
